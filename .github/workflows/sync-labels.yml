name: Sync Labels from Issue to PR

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  copy-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Copy Labels
        uses: michalvankodev/copy-issue-labels@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
